version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nrdpp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nrdpp
      POSTGRES_PASSWORD: nrdpp_secret
      POSTGRES_DB: nrdpp_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nrdpp -d nrdpp_db']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nrdpp_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://nrdpp:nrdpp_secret@postgres:5432/nrdpp_db
      JWT_SECRET: super_secret_jwt_key_change_in_production
      JWT_REFRESH_SECRET: super_secret_refresh_key_change_in_production
      PORT: 5000
      WEB_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: nrdpp_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
  api_uploads:
